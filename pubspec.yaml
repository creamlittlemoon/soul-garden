name: soul_garden
description: Soul Garden - A healing/philosophical/artistic self-exploration app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Backend
  supabase_flutter: ^2.3.4
  
  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  glassmorphism: ^0.0.1
  
  # Animation
  flutter_staggered_animations: ^1.1.1
  
  # Audio
  audioplayers: ^5.2.1
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  # Assets section removed for MVP - add when you have actual asset files
  # assets:
  #   - assets/audio/
  #   - assets/images/
  #   - assets/animations/
  
  # Using system fonts for MVP - replace with custom fonts when available
  # To use custom fonts, create assets/fonts/ directory and place font files there
